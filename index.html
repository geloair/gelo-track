<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="ACA_PEGAS_EL_LINK_RAW_DE_TU_LOGO">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELO Track - Buscador de Pedidos</title>
    <style>
        /* 🎨 IDENTIDAD VISUAL: PREMIUM DARK STITCH */
        body {
            background-color: #080808;
            /* Fondo sutil con efecto de fibra o textura deportiva */
            background-image: radial-gradient(rgba(26, 26, 26, 0.8) 15%, transparent 16%),
                              radial-gradient(rgba(26, 26, 26, 0.8) 15%, transparent 16%);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            color: #ffffff;
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            text-align: center;
            background: linear-gradient(145deg, #121212, #181818);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            margin-bottom: 30px; /* Espacio para que no choque con las redes */
        }

        /* 🏷️ SECCIÓN DEL LOGO */
        .brand-header {
            margin-bottom: 35px;
        }
        
        .brand-logo {
            max-width: 90px; /* Al talle ideal */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #666;
            margin-top: 5px;
            margin-bottom: 0;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 🔍 BUSCADOR ESTILO URBANO */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        input[type="text"]:focus {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        button {
            padding: 18px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        button:hover {
            background: #e6e6e6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }

        /* 📊 BARRA DE PROGRESO PREMIUM */
        .progress-wrapper {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        #progressPercent {
            color: #2ecc71;
            font-size: 0.9rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* 📋 CONTENEDOR DE RESULTADOS */
        .result-container {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            text-align: left;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            display: none;
            margin-top: 25px;
            padding: 12px;
            background: rgba(255, 77, 77, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        /* 👕 BLOQUES DE ESTADO ESTILO TALLER TEXTIL */
        .status-step {
            padding: 18px 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #333333;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .status-step.done {
            background: rgba(46, 204, 113, 0.04);
            border-left-color: #2ecc71;
            border-right: 1px solid rgba(46, 204, 113, 0.1);
            color: #ffffff;
        }

        .status-step.current {
            background: rgba(241, 196, 15, 0.05);
            border-left-color: #f1c40f;
            border-right: 1px solid rgba(241, 196, 15, 0.1);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.05);
            animation: pulse-border 2.5s infinite;
        }

        /* Botón secundario para volver al inicio */
        .btn-back {
            display: block;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn-back:hover {
            color: #ffffff;
            border-color: #ffffff;
            background: rgba(255,255,255,0.02);
        }

        @keyframes pulse-border {
            0% { border-left-color: #f1c40f; }
            50% { border-left-color: #f39c12; opacity: 0.95; }
            100% { border-left-color: #f1c40f; }
        }

        /* 📱 SECCIÓN DE REDES SOCIALES (FOOTER) */
        .brand-footer {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .footer-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .footer-link svg {
            width: 18px;
            height: 18px;
            fill: #555;
            transition: all 0.3s ease;
        }

        /* Efecto iluminado al pasar el cursor o tocar */
        .footer-link:hover {
            color: #ffffff;
        }
        
        .footer-link:hover svg.icon-instagram {
            fill: #e1306c;
            filter: drop-shadow(0 0 8px rgba(225, 48, 108, 0.6));
        }

        .footer-link:hover svg.icon-whatsapp {
            fill: #25d366;
            filter: drop-shadow(0 0 8px rgba(37, 211, 102, 0.6));
        }

        /* 📱 RESPONSIVE EXTREMO PARA CELULARES */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 30px 20px; border-radius: 16px; }
            h1 { font-size: 1.8rem; }
            .brand-logo { max-width: 80px; }
            input[type="text"], button { padding: 16px; font-size: 0.95rem; }
            .status-step { font-size: 0.88rem; padding: 14px 12px; }
            .footer-link { font-size: 0.75rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <!-- HEADER DE LA MARCA -->
        <div class="brand-header">
            <img class="brand-logo" src="Logo%20ANGELO%20FINAL.png" alt="Logo Angelo">
            <h1>GELO Track</h1>
            <div class="subtitle">INDUMENTARIA PERSONALIZADA</div>
        </div>
        
        <!-- BUSCADOR -->
        <div class="search-box">
            <input type="text" id="trackingInput" placeholder="INGRESÁ TU CÓDIGO DE ORDEN">
            <button onclick="buscarPedido()">Buscar Pedido</button>
        </div>

        <div id="errorMsg" class="error-msg">⚠️ Código no encontrado. Verificá los números e intentalo de nuevo.</div>

        <!-- RESULTADOS -->
        <div id="resultContainer" class="result-container">
            <h3 style="margin-top:0; margin-bottom: 20px; color:#555; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;">Detalle de seguimiento:</h3>
            <div id="pantallaCliente"></div>
        </div>
    </div>

    <!-- 🔗 PIE DE PÁGINA CON ICONOS DE REDES SOCIALES -->
    <div class="brand-footer">
        <!-- 📌 REEMPLAZÁ EL LINK DE INSTAGRAM EN EL 'href' -->
        <a class="footer-link" href="https://www.instagram.com/geloair/" target="_blank">
            <svg class="icon-instagram" viewBox="0 0 24 24">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
            </svg>
            Instagram
        </a>
        
        <!-- 📌 REEMPLAZÁ EL LINK DE WHATSAPP EN EL 'href' (Poné tu número después del /) -->
        <a class="footer-link" href="https://wa.me/5491150602314" target="_blank">
            <svg class="icon-whatsapp" viewBox="0 0 24 24">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.413 9.863-9.847.001-2.633-1.025-5.101-2.89-6.969-1.866-1.868-4.348-2.895-6.976-2.896-5.44 0-9.865 4.413-9.868 9.849-.001 1.765.467 3.491 1.357 5.021l-.993 3.626 3.71-.973zm11.233-6.104c-.3-.15-1.774-.875-2.046-.975-.272-.1-.47-.15-.667.15-.198.3-.765.961-.937 1.162-.173.2-.346.225-.646.075-.3-.15-1.263-.465-2.403-1.482-.888-.793-1.488-1.773-1.663-2.073-.174-.3-.019-.463.13-.612.135-.133.3-.35.45-.525.15-.175.2-.299.3-.5.1-.2.05-.375-.025-.525-.075-.15-.667-1.605-.913-2.196-.24-.575-.48-.497-.667-.506-.171-.008-.368-.01-.565-.01-.197 0-.518.074-.79.373-.272.3-1.04 1.016-1.04 2.479 0 1.464 1.066 2.88 1.215 3.081.149.2 2.099 3.205 5.084 4.495.71.307 1.265.49 1.697.627.713.227 1.361.195 1.874.118.571-.085 1.774-.725 2.022-1.424.247-.699.247-1.299.173-1.424-.074-.124-.272-.199-.572-.349z"/>
            </svg>
            WhatsApp
        </a>
    </div>

    <script>
        // ==========================================
        // 🌐 CONEXIÓN EN VIVO CON GOOGLE SHEETS
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDQngX9orjJ-Bo2BQkqThZreDq1IHZqdIcAxJjPuR8NPNMPYTv5U6f25FhPcO57gyopA/exec";

        async function buscarPedido() {
            const codigo = document.getElementById("trackingInput").value.trim();
            const resultContainer = document.getElementById("resultContainer");
            const pantallaCliente = document.getElementById("pantallaCliente");
            const errorMsg = document.getElementById("errorMsg");

            if (!codigo) return;

            resultContainer.style.display = "none";
            errorMsg.style.display = "none";
            pantallaCliente.innerHTML = `<p style="text-align:center; color:#888; font-weight:600; padding:20px;">🔍 Buscando en el sistema del taller...</p>`;
            resultContainer.style.display = "block";

            try {
                const respuesta = await fetch(SCRIPT_URL);
                const baseDeDatos = await respuesta.json();

                if (baseDeDatos && baseDeDatos[codigo]) {
                    const pedido = baseDeDatos[codigo];
                    const pasoActual = parseInt(pedido.pasoActual) || 1;
                    
                    // Estructura que asocia cada paso con su texto y su foto correspondiente
                    const estructuraPasos = [
                        { icono: "🤝", titulo: "1. Pedido recibido", descEspecifica: pedido.detalle1, foto: null },
                        { icono: "💻", titulo: "2. Moldería & diseño digital", descEspecifica: pedido.detalle2, foto: pedido.foto2 },
                        { icono: "🖨️", titulo: "3. Impresión & Sublimado", descEspecifica: pedido.detalle3, foto: pedido.foto3 },
                        { icono: "✂️", titulo: "4. Mesa de Corte & Confección", descEspecifica: pedido.detalle4, foto: pedido.foto4 },
                        { icono: "🔎", titulo: "5. Control de Calidad & Embalaje", descEspecifica: pedido.detalle5, foto: pedido.foto5 },
                        { icono: "📦", titulo: "6. Pedido Listo para Entrega", descEspecifica: pedido.detalle6, foto: pedido.foto6 },
                        { icono: "🚀", titulo: "7. Pedido Enviado / Entregado 🎉", descEspecifica: pedido.detalle7, foto: pedido.foto7 }
                    ];

                    let pasosHTML = `<h4 style="color:#fff; margin-top:0; margin-bottom:20px; font-size:1.1rem; font-weight: 700; letter-spacing: 0.5px;">Cliente: ${pedido.cliente}</h4>`;
                    let pasosTerminados = 0;
                    let tieneCurrent = 0;

                    estructuraPasos.forEach((paso, index) => {
                        const numeroPaso = index + 1;
                        let claseEstado = "";
                        let colorTextoDesc = "#555";
                        let descripcion = "";

                        if (numeroPaso < pasoActual) {
                            claseEstado = "done";
                            colorTextoDesc = "#8cbd9c"; 
                            pasosTerminados++;
                            descripcion = paso.descEspecifica ? `Estado: ${paso.descEspecifica}` : "Estado: Completado.";
                        } else if (numeroPaso === pasoActual) {
                            claseEstado = "current";
                            colorTextoDesc = "#ebdca5"; 
                            tieneCurrent = 1;
                            descripcion = paso.descEspecifica ? `Estado: ${paso.descEspecifica}` : "Estado: En proceso actual.";
                        } else {
                            claseEstado = "";
                            colorTextoDesc = "#555"; 
                            descripcion = "Estado: Pendiente.";
                        }

                        // Generar el bloque de la imagen solo si hay un link cargado en esa columna específica
                        let imagenHTML = "";
                        if (paso.foto && paso.foto.trim() !== "") {
                            imagenHTML = `
                                <div style="margin-top: 10px; max-width: 100%; overflow: hidden; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);">
                                    <img src="${paso.foto.trim()}" alt="Evidencia taller" style="width: 100%; height: auto; display: block; object-fit: cover;">
                                </div>
                            `;
                        }

                        pasosHTML += `
                            <div class="status-step ${claseEstado}" style="padding-bottom: 15px;">
                                <span style="font-size: 1.1rem; margin-right: 8px;">${paso.icono}</span> ${claseEstado === 'done' ? '🟩' : (claseEstado === 'current' ? '🟦' : '⬛')} ${paso.titulo}
                                <br><span style="font-size: 0.8rem; color: ${colorTextoDesc}; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px; margin-bottom: 5px;">${descripcion}</span>
                                ${imagenHTML}
                            </div>
                        `;
                    });

                    pantallaCliente.innerHTML = pasosHTML;

                    let porcentaje = 0;
                    if (estructuraPasos.length > 0) {
                        porcentaje = Math.round(((pasosTerminados + (tieneCurrent * 0.5)) / estructuraPasos.length) * 100);
                    }
                    if (porcentaje > 100) porcentaje = 100;

                    const barraHTML = `
                        <div class="progress-wrapper">
                            <div class="progress-info">
                                <span>PROGRESO DE PRODUCCIÓN</span>
                                <span id="progressPercent">${porcentaje}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${porcentaje}%;"></div>
                            </div>
                        </div>
                    `;

                    pantallaCliente.insertAdjacentHTML('afterbegin', barraHTML);

                    const botonVolverHTML = `<button class="btn-back" onclick="volverInicio()">← Volver al Inicio</button>`;
                    pantallaCliente.insertAdjacentHTML('beforeend', botonVolverHTML);

                } else {
                    resultContainer.style.display = "none";
                    errorMsg.style.display = "block";
                }

            } catch (error) {
                console.error("Error conectando con el taller:", error);
                pantallaCliente.innerHTML = `<p style="text-align:center; color:#ff4d4d; font-weight:600; padding:20px;">⚠️ Error de conexión. Intentalo de nuevo en unos instantes.</p>`;
            }
        }

        function volverInicio() {
            const resultContainer = document.getElementById("resultContainer");
            const trackingInput = document.getElementById("trackingInput");
            
            resultContainer.style.display = "none";
            trackingInput.value = "";
            trackingInput.focus();
        }
</script>
</body>
</html>
