<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELO Track - Buscador de Pedidos</title>
    <style>
        /* 🎨 IDENTIDAD VISUAL: PREMIUM DARK STITCH */
        body {
            background-color: #080808;
            /* Fondo sutil con efecto de fibra o textura deportiva */
            background-image: radial-gradient(rgba(26, 26, 26, 0.8) 15%, transparent 16%),
                              radial-gradient(rgba(26, 26, 26, 0.8) 15%, transparent 16%);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            color: #ffffff;
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            text-align: center;
            background: linear-gradient(145deg, #121212, #181818);
            padding: 40px 30px;
            border-radius: 20px;
            /* Sombra profunda y borde sutil que simula un relieve premium */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        /* 🏷️ SECCIÓN DEL LOGO */
        .brand-header {
            margin-bottom: 35px;
        }
        
        .brand-logo {
            max-width: 140px; /* Tamaño ideal para el logo */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        /* Si no hay logo subido, este texto se ve premium */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #666;
            margin-top: 5px;
            margin-bottom: 0;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 🔍 BUSCADOR ESTILO URBANO */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        input[type="text"]:focus {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        button {
            padding: 18px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        button:hover {
            background: #e6e6e6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        /* 📊 BARRA DE PROGRESO PREMIUM */
        .progress-wrapper {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        #progressPercent {
            color: #2ecc71;
            font-size: 0.9rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* 📋 CONTENEDOR DE RESULTADOS */
        .result-container {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            text-align: left;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            display: none;
            margin-top: 25px;
            padding: 12px;
            background: rgba(255, 77, 77, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        /* 👕 BLOQUES DE ESTADO ESTILO TALLER TEXTIL */
        .status-step {
            padding: 18px 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #333333;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        /* Estado completado (Verde neon discreto) */
        .status-step.done {
            background: rgba(46, 204, 113, 0.04);
            border-left-color: #2ecc71;
            border-right: 1px solid rgba(46, 204, 113, 0.1);
            color: #ffffff;
        }

        /* Estado actual (Amarillo de producción activo) */
        .status-step.current {
            background: rgba(241, 196, 15, 0.05);
            border-left-color: #f1c40f;
            border-right: 1px solid rgba(241, 196, 15, 0.1);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.05);
            animation: pulse-border 2.5s infinite;
        }

        @keyframes pulse-border {
            0% { border-left-color: #f1c40f; }
            50% { border-left-color: #f39c12; opacity: 0.95; }
            100% { border-left-color: #f1c40f; }
        }

        /* 📱 RESPONSIVE EXTREMO PARA CELULARES */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 30px 20px;
                border-radius: 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .brand-logo {
                max-width: 110px;
            }
            input[type="text"], button {
                padding: 16px;
                font-size: 0.95rem;
            }
            .status-step {
                font-size: 0.88rem;
                padding: 14px 12px;
            }
        }
    </style>
    <!-- Importamos una tipografía más pro y deportiva desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <!-- HEADER DE LA MARCA -->
        <div class="brand-header">
            <!-- 📌 REEMPLAZÁ EL LINK DE ABAJO POR EL DE TU LOGO REAL -->
            <img class="brand-logo" src="Logo%20ANGELO%20FINAL.png">
            <h1>GELO Track</h1>
            <div class="subtitle">Estado de Confección</div>
        </div>
        
        <!-- BUSCADOR -->
        <div class="search-box">
            <input type="text" id="trackingInput" placeholder="INGRESÁ TU CÓDIGO DE ORDEN">
            <button onclick="buscarPedido()">Buscar Pedido</button>
        </div>

        <div id="errorMsg" class="error-msg">⚠️ Código no encontrado. Verificá los números e intentalo de nuevo.</div>

        <!-- RESULTADOS -->
        <div id="resultContainer" class="result-container">
            <h3 style="margin-top:0; margin-bottom: 20px; color:#555; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;">Detalle de seguimiento:</h3>
            <div id="pantallaCliente"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 📁 BASE DE DATOS DE CLIENTES
        // ==========================================
        const baseDeDatos = {
            "2000016745293404": `
                <h4 style="color:#fff; margin-top:0; margin-bottom:20px; font-size:1.1rem; font-weight: 700; letter-spacing: 0.5px;">Cliente: Franco</h4>
                
                <div class="status-step done">
                    <span style="font-size: 1.1rem; margin-right: 8px;">🤝</span> 🟩 1. Seña recibida & turno reservado
                    <br><span style="font-size: 0.8rem; color: #8cbd9c; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Aprobado (29 de mayo).</span>
                </div>
                
                <div class="status-step current">
                    <span style="font-size: 1.1rem; margin-right: 8px;">💻</span> 🟦 2. Moldería & diseño digital en Illustrator
                    <br><span style="font-size: 0.8rem; color: #ebdca5; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: En proceso actual (Estimado hasta hoy 1 de junio).</span>
                </div>
                
                <div class="status-step">
                    <span style="font-size: 1.1rem; margin-right: 8px;">🖨️</span> ⬛ 3. Impresión & Sublimado Técnico
                    <br><span style="font-size: 0.8rem; color: #555; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Próximo paso.</span>
                </div>
                
                <div class="status-step">
                    <span style="font-size: 1.1rem; margin-right: 8px;">✂️</span> ⬛ 4. Mesa de Corte & Confección
                    <br><span style="font-size: 0.8rem; color: #555; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Pendiente.</span>
                </div>
                
                <div class="status-step">
                    <span style="font-size: 1.1rem; margin-right: 8px;">🔎</span> ⬛ 5. Control de Calidad & Embalaje
                    <br><span style="font-size: 0.8rem; color: #555; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Pendiente.</span>
                </div>
                
                <div class="status-step">
                    <span style="font-size: 1.1rem; margin-right: 8px;">📦</span> ⬛ 6. Pedido Listo para Entrega
                    <br><span style="font-size: 0.8rem; color: #555; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Pendiente.</span>
                </div>

                <div class="status-step">
                    <span style="font-size: 1.1rem; margin-right: 8px;">🚀</span> ⬛ 7. Pedido Enviado / Entregado 🎉
                    <br><span style="font-size: 0.8rem; color: #555; font-style: italic; font-weight: normal; display: block; margin-top: 5px; margin-left: 28px;">Estado: Pendiente.</span>
                </div>
            `
        };

        function buscarPedido() {
            const codigo = document.getElementById("trackingInput").value.trim();
            const resultContainer = document.getElementById("resultContainer");
            const pantallaCliente = document.getElementById("pantallaCliente");
            const errorMsg = document.getElementById("errorMsg");

            resultContainer.style.display = "none";
            errorMsg.style.display = "none";

            if (baseDeDatos[codigo]) {
                pantallaCliente.innerHTML = baseDeDatos[codigo];
                resultContainer.style.display = "block";

                const pasosTotales = pantallaCliente.querySelectorAll('.status-step').length;
                const pasosTerminados = pantallaCliente.querySelectorAll('.status-step.done').length;
                const pasoActual = pantallaCliente.querySelectorAll('.status-step.current').length;
                
                let porcentaje = 0;
                if (pasosTotales > 0) {
                    porcentaje = Math.round(((pasosTerminados + (pasoActual * 0.5)) / pasosTotales) * 100);
                }
                if (porcentaje > 100) porcentaje = 100;

                const barraHTML = `
                    <div class="progress-wrapper">
                        <div class="progress-info">
                            <span>PROGRESO DE PRODUCCIÓN</span>
                            <span id="progressPercent">${porcentaje}%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${porcentaje}%;"></div>
                        </div>
                    </div>
                `;

                pantallaCliente.insertAdjacentHTML('afterbegin', barraHTML);

            } else {
                errorMsg.style.display = "block";
            }
        }
    </script>

</body>
</html>
